name: build
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Update rustup
        run: rustup update stable --no-self-update
      - name: Format check
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --check -l
      - name: Prepare targets
        run: |
          rustup target add wasm32-unknown-unknown
          rustup target add x86_64-unknown-linux-gnu
      - name: Clippy check
        run: |
          rustup component add clippy
          cargo clippy --locked --all-targets --workspace -- -D warnings
      - name: Run tests
        run: cargo test --locked --all-targets --workspace --verbose
      - name: Build native crates
        run: cargo build --locked --workspace --verbose
      - name: Build without default features
        run: cargo build --workspace --no-default-features --verbose
      - name: Build wasm target
        run: cargo build --locked --workspace --target wasm32-unknown-unknown --verbose
      - name: Cargo publish dry-run
        run: cargo publish --locked --dry-run
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build wasm package and npm dry-run
        run: |
          wasm-pack build --out-dir pkg --scope csaf-rs
          cd pkg
          npm pack --dry-run
